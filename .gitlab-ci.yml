stages:
  - build
  - deploy

variables:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────
# BUILD — compile frontend static files
# ─────────────────────────────────────────────────────────────
build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    # VITE_API_URL must be set as a GitLab CI/CD variable pointing to your Cloudflare Worker URL
    # e.g. https://spygame-worker.YOUR_ACCOUNT.workers.dev
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────────────────────────────
# DEPLOY FRONTEND — GitLab Pages (free static hosting)
# ─────────────────────────────────────────────────────────────
pages:
  stage: deploy
  image: alpine:latest
  script:
    - cp -r dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs: [build]

# ─────────────────────────────────────────────────────────────
# DEPLOY WORKER — Cloudflare Worker (free tier)
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#   GEMINI_API_KEY         — Google Gemini API key (set as Worker secret too)
#   FRONTEND_URL           — Your GitLab Pages URL (e.g. https://username.gitlab.io/spygame)
# ─────────────────────────────────────────────────────────────
deploy_worker:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    # Apply D1 schema (idempotent)
    - npx wrangler d1 execute spycraft --remote --file=worker/schema.sql
    # Seed the 239 static base puzzles (idempotent via INSERT OR IGNORE)
    - npx wrangler d1 execute spycraft --remote --file=worker/puzzles-seed.sql
    # Set secrets
    - echo "${GEMINI_API_KEY}" | npx wrangler secret put GEMINI_API_KEY
    - echo "${FRONTEND_URL}" | npx wrangler secret put FRONTEND_URL
    - echo "${STRIPE_SECRET_KEY}" | npx wrangler secret put STRIPE_SECRET_KEY
    - echo "${STRIPE_WEBHOOK_SECRET}" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
    # Deploy the Worker
    - npx wrangler deploy
  environment:
    name: production
    url: https://spygame-worker.${CLOUDFLARE_ACCOUNT_ID}.workers.dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs: [build]
